services:
  ollama:
    build:
      context: .
      dockerfile: Dockerfile.ollama
    container_name: ollama-cpu
    ports:
      - "11434:11434"     # Mantenha se quiser acessar API Ollama direto; senão remova
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 6G
        reservations:
          memory: 2G
    environment:
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_KEEP_ALIVE=5m
      - OLLAMA_FLASH_ATTENTION=true
      - OLLAMA_KV_CACHE_TYPE=q8_0          # Extra: reduz RAM no contexto longo
      - OLLAMA_CONTEXT_LENGTH=2048         # Extra: evita explosão de RAM

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "3000:8080"
    volumes:
      - open-webui_data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_AUTH=False                    # ← Isso desabilita login (single-user mode)
      - ENABLE_PERSISTENT_CONFIG=False      # Extra: força usar env vars, ignora DB (útil aqui)
      # - GLOBAL_LOG_LEVEL=WARNING          # Opcional: menos spam no log
    restart: unless-stopped
    depends_on:
      - ollama

volumes:
  ollama_data:
  open-webui_data: